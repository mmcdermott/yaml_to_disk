name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "dev"]

jobs:
  run_tests_ubuntu:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup package (no optional extras)
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests without optional deps
        run: uv run pytest -v --cov=yaml_to_disk

      - name: Install optional extras
        run: uv sync --locked --group dev --extra parquet --extra toml

      - name: Run tests with optional deps
        run: uv run pytest -v --cov=yaml_to_disk --cov-append --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
